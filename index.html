
<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Platba — Felin, s.r.o.</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
.card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 2rem; width: 100%; max-width: 420px; }
h1 { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
.sub { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; color: #1a1a1a; outline: none; margin-bottom: 1rem; }
input:focus { border-color: #4a7fcb; }
button.main { width: 100%; padding: 12px; background: #1a3a6b; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
.result { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #eee; text-align: center; display: none; }
.meta { margin-top: 12px; font-size: 13px; color: #555; line-height: 1.8; }
.meta strong { color: #1a1a1a; }
button.print { margin-top: 1rem; width: 100%; padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; cursor: pointer; color: #333; }
.logo { font-size: 13px; color: #aaa; text-align: center; margin-top: 1.5rem; }
@media print {
  body { background: #fff; padding: 0; display: block; }
  .card { box-shadow: none; max-width: 100%; padding: 1rem; }
  .no-print { display: none !important; }
  h1, .sub, .logo { display: none; }
  .result { border: none; margin-top: 0; padding-top: 0; }
}
</style>
</head>
<body>
<div class="card">
  <h1>QR kód pre platbu</h1>
  <p class="sub">Felin, s.r.o. — dobierka / platba prevodom</p>
  <div class="no-print">
    <label for="order">Číslo objednávky</label>
    <input type="text" id="order" placeholder="napr. 2026000990" />
    <label for="amount">Suma (€)</label>
    <input type="number" id="amount" placeholder="napr. 349.00" step="0.01" min="0" />
    <button class="main" onclick="generate()">Vygenerovať QR kód</button>
  </div>
  <div class="result" id="result">
    <canvas id="qr"></canvas>
    <div class="meta" id="meta"></div>
    <button class="print no-print" onclick="window.print()">Vytlačiť</button>
  </div>
  <div class="logo no-print">catalina.sk</div>
</div>
<script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode.js"></script>
<script>
var IBAN = "SK3175000000004034426980";
var RECIPIENT = "Felin, s.r.o.";

function generate() {
  var order = document.getElementById("order").value.trim();
  var amount = document.getElementById("amount").value.trim();
  if (!order || !amount || isNaN(parseFloat(amount))) { alert("Zadaj číslo objednávky a sumu."); return; }
  var amtStr = parseFloat(amount).toFixed(2);
  var payload = "SPD*1.0*ACC:" + IBAN + "*AM:" + amtStr + "*CC:EUR*X-VS:" + order + "*MSG:Objednavka " + order;

  var qr = qrcode(0, 'M');
  qr.addData(payload);
  qr.make();

  var canvas = document.getElementById("qr");
  var size = 220;
  var count = qr.getModuleCount();
  var tile = size / count;
  canvas.width = size;
  canvas.height = size;
  var ctx = canvas.getContext("2d");
  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, size, size);
  ctx.fillStyle = "#000";
  for (var row = 0; row < count; row++) {
    for (var col = 0; col < count; col++) {
      if (qr.isDark(row, col)) {
        ctx.fillRect(Math.round(col * tile), Math.round(row * tile), Math.ceil(tile), Math.ceil(tile));
      }
    }
  }

  document.getElementById("result").style.display = "block";
  var fmt = new Intl.NumberFormat("sk-SK", { style: "currency", currency: "EUR" });
  document.getElementById("meta").innerHTML =
    "<strong>" + RECIPIENT + "</strong><br>" +
    "IBAN: " + IBAN.match(/.{1,4}/g).join(" ") + "<br>" +
    "Objedn\u00e1vka: <strong>" + order + "</strong> | Suma: <strong>" + fmt.format(parseFloat(amount)) + "</strong><br>" +
    "VS: " + order;
}

document.getElementById("order").addEventListener("keydown", function(e){ if(e.key==="Enter") generate(); });
document.getElementById("amount").addEventListener("keydown", function(e){ if(e.key==="Enter") generate(); });
</script>
</body>
</html>
