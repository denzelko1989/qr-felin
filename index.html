
<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Platba — Felin, s.r.o.</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
.card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 2rem; width: 100%; max-width: 440px; }
h1 { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
.sub { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; color: #1a1a1a; outline: none; margin-bottom: 1rem; }
input:focus { border-color: #4a7fcb; }
button.main { width: 100%; padding: 12px; background: #1a3a6b; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
.result { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #eee; text-align: center; display: none; }
.qr-box { display: inline-block; padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 1rem; }
.meta { font-size: 14px; color: #333; line-height: 2; }
.meta strong { color: #1a1a1a; }
.meta .hint { font-size: 12px; color: #999; margin-top: 8px; }
button.print { margin-top: 1rem; width: 100%; padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; cursor: pointer; color: #333; }
.logo { font-size: 12px; color: #ccc; text-align: center; margin-top: 1.5rem; }

@media print {
  @page { size: A4; margin: 25mm 20mm; }
  html, body { background: #fff !important; }
  body { display: block; padding: 0; margin: 0; }
  .no-print { display: none !important; }
  .card { box-shadow: none; border-radius: 0; max-width: 100%; padding: 0; margin: 0; }
  .result { display: block !important; border: none; padding-top: 0; margin-top: 0; }
  .print-header { display: block !important; }
}
.print-header {
  display: none;
  text-align: center;
  margin-bottom: 2rem;
}
.print-header h2 { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
.print-header p { font-size: 13px; color: #666; }
</style>
</head>
<body>
<div class="card">

  <div class="print-header" id="printHeader">
    <h2 id="printTitle">Platobný QR kód</h2>
    <p>Felin, s.r.o. — platba prevodom</p>
  </div>

  <h1 class="no-print">QR kód pre platbu</h1>
  <p class="sub no-print">Felin, s.r.o. — dobierka / platba prevodom</p>

  <div class="no-print">
    <label for="order">Číslo objednávky</label>
    <input type="text" id="order" placeholder="napr. 2026000990" />
    <label for="amount">Suma (€)</label>
    <input type="number" id="amount" placeholder="napr. 349.00" step="0.01" min="0" />
    <button class="main" onclick="generate()">Vygenerovať QR kód</button>
  </div>

  <div class="result" id="result">
    <div class="qr-box">
      <canvas id="qr"></canvas>
    </div>
    <div class="meta" id="meta"></div>
    <button class="print no-print" onclick="window.print()">&#128438; Vytlačiť</button>
  </div>

  <div class="logo no-print">catalina.sk</div>
</div>

<script>
var IBAN = "SK3175000000004034426980";
var RECIPIENT = "Felin, s.r.o.";

function generate() {
  var order = document.getElementById("order").value.trim();
  var amount = document.getElementById("amount").value.trim();
  if (!order || !amount || isNaN(parseFloat(amount))) { alert("Zadaj číslo objednávky a sumu."); return; }

  var amtStr = parseFloat(amount).toFixed(2);
  var payload = "SPD*1.0*ACC:" + IBAN + "*AM:" + amtStr + "*CC:EUR*X-VS:" + order + "*MSG:Objednavka " + order;

  var canvas = document.getElementById("qr");
  canvas.width = 0; canvas.height = 0;
  var tmp = document.createElement("div");
  tmp.style.display = "none";
  document.body.appendChild(tmp);

  try {
    var qr = new QRCode(tmp, { text: payload, width: 250, height: 250, correctLevel: QRCode.CorrectLevel.M });
    setTimeout(function() {
      var src = tmp.querySelector("canvas") || tmp.querySelector("img");
      var dataUrl = src.tagName === "CANVAS" ? src.toDataURL() : src.src;
      document.body.removeChild(tmp);
      var img = new Image();
      img.onload = function() {
        canvas.width = 250; canvas.height = 250;
        canvas.getContext("2d").drawImage(img, 0, 0);
      };
      img.src = dataUrl;
    }, 200);
  } catch(e) {
    document.body.removeChild(tmp);
    alert("Chyba: " + e.message);
    return;
  }

  document.getElementById("result").style.display = "block";
  document.getElementById("printTitle").textContent = "Platobný QR kód — objednávka " + order;

  var fmt = new Intl.NumberFormat("sk-SK", { style: "currency", currency: "EUR" });
  document.getElementById("meta").innerHTML =
    "<strong>" + RECIPIENT + "</strong><br>" +
    "IBAN:&nbsp; " + IBAN.match(/.{1,4}/g).join(" ") + "<br>" +
    "Objedn\u00e1vka:&nbsp; <strong>" + order + "</strong>&nbsp;&nbsp;&nbsp;Suma:&nbsp; <strong>" + fmt.format(parseFloat(amount)) + "</strong><br>" +
    "VS:&nbsp; " + order + "<br>" +
    "<span class='hint'>Naskenujte QR k\u00f3d mobilnou bankovnicou a zaplate.</span>";
}

document.getElementById("order").addEventListener("keydown", function(e){ if(e.key==="Enter") generate(); });
document.getElementById("amount").addEventListener("keydown", function(e){ if(e.key==="Enter") generate(); });
</script>
</body>
</html>
