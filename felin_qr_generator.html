<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Platba — Felin, s.r.o.</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 2rem; width: 100%; max-width: 420px; }
  h1 { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
  label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
  input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; color: #1a1a1a; outline: none; transition: border-color 0.2s; margin-bottom: 1rem; }
  input:focus { border-color: #4a7fcb; }
  button.main { width: 100%; padding: 12px; background: #1a3a6b; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  button.main:hover { background: #142d55; }
  .result { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #eee; text-align: center; display: none; }
  .result canvas { display: block; margin: 0 auto; }
  .meta { margin-top: 12px; font-size: 13px; color: #555; line-height: 1.8; }
  .meta strong { color: #1a1a1a; }
  button.print { margin-top: 1rem; width: 100%; padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; cursor: pointer; color: #333; transition: background 0.15s; }
  button.print:hover { background: #f5f5f5; }
  .logo { font-size: 13px; color: #aaa; text-align: center; margin-top: 1.5rem; }

  @media print {
    body { background: #fff; padding: 0; display: block; }
    .card { box-shadow: none; max-width: 100%; padding: 1rem; }
    .no-print { display: none !important; }
    h1, .sub { display: none; }
    .result { border: none; margin-top: 0; padding-top: 0; }
    .logo { display: none; }
  }
</style>
</head>
<body>

<div class="card">
  <h1>QR kód pre platbu</h1>
  <p class="sub">Felin, s.r.o. — dobierka / platba prevodom</p>

  <div class="no-print">
    <label for="order">Číslo objednávky</label>
    <input type="text" id="order" placeholder="napr. 2026000990" />

    <label for="amount">Suma (€)</label>
    <input type="number" id="amount" placeholder="napr. 349.00" step="0.01" min="0" />

    <button class="main" onclick="generate()">&#9726; Vygenerovať QR kód</button>
  </div>

  <div class="result" id="result">
    <canvas id="qrCanvas"></canvas>
    <div class="meta" id="meta"></div>
    <button class="print no-print" onclick="window.print()">&#128438; Vytlačiť</button>
  </div>

  <div class="logo no-print">catalina.sk</div>
</div>

const IBAN = "SK3175000000004034426980";
const RECIPIENT = "Felin, s.r.o.";

function generate() {
  const order = document.getElementById("order").value.trim();
  const amount = document.getElementById("amount").value.trim();
  if (!order || !amount || isNaN(parseFloat(amount))) {
    alert("Zadaj číslo objednávky a sumu.");
    return;
  }

  const amtStr = parseFloat(amount).toFixed(2);
  const payload = `SPD*1.0*ACC:${IBAN}*AM:${amtStr}*CC:EUR*X-VS:${order}*MSG:Objednavka ${order}`;

  const resultDiv = document.getElementById("result");
  resultDiv.style.display = "block";

  const canvas = document.getElementById("qrCanvas");
  try {
    const qr = qrcode.createQrCode(payload, 0);
    qrcode.renderToCanvas(canvas, qr, 7);
  } catch(e) {
    alert("Chyba pri generovaní QR: " + e.message);
    return;
  }

  const fmt = new Intl.NumberFormat("sk-SK", { style: "currency", currency: "EUR" });
  document.getElementById("meta").innerHTML =
    `<strong>${RECIPIENT}</strong><br>` +
    `IBAN: ${IBAN.match(/.{1,4}/g).join(" ")}<br>` +
    `Objednávka: <strong>${order}</strong> &nbsp;|&nbsp; Suma: <strong>${fmt.format(parseFloat(amount))}</strong><br>` +
    `VS: ${order}`;
}

document.getElementById("order").addEventListener("keydown", e => e.key === "Enter" && generate());
document.getElementById("amount").addEventListener("keydown", e => e.key === "Enter" && generate());
</script>
